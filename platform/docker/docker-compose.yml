# ────────────────────────────────────────────────────
# OpenClaw Enterprise - Docker Compose (infra base)
# Crea la red y servicios compartidos
# ────────────────────────────────────────────────────

version: '3.8'

services:
  # Proxy reverso para todos los clientes
  caddy:
    image: caddy:2-alpine
    container_name: openclaw-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - openclaw-net

  # Dashboard web de administración
  admin:
    image: nginx:alpine
    container_name: openclaw-admin
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ../../web:/usr/share/nginx/html:ro
    networks:
      - openclaw-net

networks:
  openclaw-net:
    external: true

volumes:
  caddy_data:
  caddy_config:
